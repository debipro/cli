name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  DEBI_KEYRING_PASSWORD: ci-test-passphrase

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      DEBI_CONFIG_DIR: ${{ runner.temp }}/debi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Prepare config dir
        shell: bash
        run: mkdir -p "$DEBI_CONFIG_DIR"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      DEBI_CONFIG_DIR: ${{ runner.temp }}/debi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build and smoke test
        shell: bash
        run: |
          mkdir -p "$DEBI_CONFIG_DIR"
          go build -o bin/debi ./cmd/debi
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            bin/debi.exe --help | grep -q customers
            bin/debi.exe spec info | grep -q Paths
            bin/debi.exe customers --help | grep -q list
          else
            ./bin/debi --help | grep -q customers
            ./bin/debi spec info | grep -q Paths
            ./bin/debi customers --help | grep -q list
          fi
