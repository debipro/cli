version: 2

project_name: debi

before:
  hooks:
    - go mod tidy

builds:
  - id: debi
    main: ./cmd/debi
    binary: debi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/tucuota/debi-cli/pkg/version.Version={{ .Version }}

archives:
  - id: debi
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/tucuota/debi-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-amd64"
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/tucuota/debi-cli:latest"
    image_templates:
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-amd64"
      - "ghcr.io/tucuota/debi-cli:{{ .Version }}-arm64"

release:
  github:
    owner: tucuota
    name: debi-cli
