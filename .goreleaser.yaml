version: 2

project_name: debi

before:
  hooks:
    - go mod tidy

builds:
  - id: debi
    main: ./cmd/debi
    binary: debi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/debipro/cli/pkg/version.Version={{ .Version }}

archives:
  - id: debi
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}mac-os
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - none*

checksum:
  name_template: checksums.txt

nfpms:
  - id: deb
    package_name: debi
    vendor: Debi
    homepage: https://debi.pro
    maintainer: Debi <support@debi.pro>
    description: Command-line interface for the Debi API
    license: MIT
    formats: [deb]
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    dependencies:
      - libsecret-1-0
      - gnome-keyring
  - id: rpm
    package_name: debi
    vendor: Debi
    homepage: https://debi.pro
    maintainer: Debi <support@debi.pro>
    description: Command-line interface for the Debi API
    license: MIT
    formats: [rpm]
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: debi
    ids: [debi]
    directory: Formula
    homepage: https://debi.pro
    description: Command-line interface for the Debi API
    license: MIT
    skip_upload: "{{ if not .Env.GH_PAT }}true{{ end }}"
    install: |
      bin.install "debi"
    test: |
      assert_match "debi", shell_output("#{bin}/debi version")
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: debipro
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"

scoops:
  - name: debi
    ids: [debi]
    homepage: https://debi.pro
    description: Command-line interface for the Debi API
    license: MIT
    skip_upload: "{{ if not .Env.GH_PAT }}true{{ end }}"
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: debipro
      name: scoop-debi
      token: "{{ .Env.GH_PAT }}"

winget:
  - name: debi
    ids: [debi]
    publisher: Debi
    short_description: Command-line interface for the Debi API
    license: MIT
    publisher_url: https://debi.pro
    homepage: https://debi.pro
    package_identifier: Debi.DebiCli
    skip_upload: "{{ if not .Env.GH_PAT }}true{{ end }}"
    commit_msg_template: "Winget manifest for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: debipro
      name: winget-pkgs
      branch: "debi-cli-{{ .Version }}"
      token: "{{ .Env.GH_PAT }}"
      # Upstream PR must be opened manually from debipro/winget-pkgs — a
      # fine-grained GH_PAT cannot POST to microsoft/winget-pkgs.
      pull_request:
        enabled: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/debipro/cli:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/debipro/cli:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/debipro/cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/debipro/cli:{{ .Version }}-amd64"
      - "ghcr.io/debipro/cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/debipro/cli:latest"
    image_templates:
      - "ghcr.io/debipro/cli:{{ .Version }}-amd64"
      - "ghcr.io/debipro/cli:{{ .Version }}-arm64"

release:
  replace_existing_artifacts: true
  github:
    owner: debipro
    name: cli
